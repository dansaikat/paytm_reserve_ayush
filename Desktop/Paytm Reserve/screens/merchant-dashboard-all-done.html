<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reserve Credit — Ready to Withdraw</title>
<style>
  :root {
    --blue-500: #0088FF;
    --blue-600: #1576DB;
    --blue-700: #004299;
    --blue-900: #012A72;
    --blue-300: #00B8F5;
    --blue-50: #E8F4FF;

    --success-500: #34C759;
    --success-50: rgba(52, 199, 89, 0.1);
    --success-surface: #EAFFF4;
    --success-700: #009454;

    --gold-500: #FAAB2C;
    --gold-400: #FCCF3C;
    --gold-200: #FDDF7D;

    --warning-500: #F68832;
    --warning-50: #FFF3E8;

    --neutral-900: #000000;
    --neutral-850: #101010;
    --neutral-800: #1B1B1B;
    --neutral-700: #282828;
    --neutral-600: #333333;
    --neutral-500: #404040;
    --neutral-400: #595959;
    --neutral-300: #7E7E7E;
    --neutral-200: #999999;
    --neutral-100: #D9D9D9;
    --neutral-50: #E6E6E6;

    --surface-primary: #FFFFFF;
    --surface-secondary: #F2F2F7;
    --surface-tertiary: #F7F7F7;

    --radius-xs: 4px;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --radius-xl: 24px;
    --radius-pill: 100px;

    --shadow-subtle: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-medium: 0 4px 16px rgba(0,0,0,0.08);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  button, input, select, textarea {
    font-family: inherit;
    font-size: inherit;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'SF Pro Display', system-ui, sans-serif;
    background: var(--surface-secondary);
    color: var(--neutral-800);
    overflow-x: hidden;
  }

  .device-frame {
    width: 376px;
    height: 812px;
    margin: 0 auto;
    background: var(--surface-secondary);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* === STATUS BAR === */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 0;
    height: 44px;
    background: var(--surface-primary);
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 600;
  }
  .status-bar .icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar .icons svg { width: 16px; height: 12px; }

  /* === NAV BAR === */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 14px;
    background: var(--surface-primary);
    position: relative;
    flex-shrink: 0;
  }
  .nav-back {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    background: var(--surface-secondary);
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.15s ease;
  }
  .nav-back:active { background: var(--neutral-50); }
  .nav-back svg { width: 9px; height: 16px; }
  .nav-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    height: 44px;
  }
  .nav-brand {
    height: 30px;
    width: auto;
  }
  .nav-help {
    font-size: 15px;
    font-weight: 600;
    color: var(--neutral-800);
    cursor: pointer;
    border: none;
    background: var(--surface-secondary);
    padding: 8px 16px;
    border-radius: var(--radius-pill);
    flex-shrink: 0;
    letter-spacing: -0.23px;
    transition: background 0.15s ease;
  }
  .nav-help:active { background: var(--neutral-50); }

  /* === SCROLLABLE CONTENT === */
  .scroll-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  /* === HERO SECTION === */
  .hero-wrapper {
    background: var(--surface-secondary);
    padding: 20px 16px 0;
    position: relative;
  }
  .hero-card {
    background: var(--surface-primary);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    overflow: hidden;
    position: relative;
  }
  .hero-badge {
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(90deg, #FAAB2C, #FCCF3C, #FDDF7D);
    color: #5C3D00;
    font-size: 13px;
    font-weight: 700;
    padding: 7px 18px;
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    letter-spacing: 0.2px;
    white-space: nowrap;
    z-index: 2;
  }
  .hero-badge svg { width: 13px; height: 13px; }
  .hero-text {
    text-align: center;
    padding: 40px 20px 28px;
    position: relative;
    z-index: 1;
  }
  .hero-subtitle {
    font-size: 15px;
    font-weight: 400;
    color: var(--neutral-400);
    letter-spacing: -0.23px;
  }
  .hero-amount {
    font-size: 48px;
    font-weight: 700;
    color: var(--neutral-850);
    margin-top: 2px;
    letter-spacing: 0.37px;
    line-height: 56px;
    font-feature-settings: 'tnum';
  }

  /* === SECTION SPACER === */
  .section-spacer {
    height: 8px;
    background: var(--surface-secondary);
    flex-shrink: 0;
  }

  /* === STEPS SECTION === */
  .steps-section {
    padding: 20px 16px 0;
  }
  .steps-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 16px;
  }
  .steps-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--neutral-800);
    letter-spacing: 0;
  }
  .steps-progress {
    font-size: 13px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: var(--radius-pill);
  }
  .steps-progress.done {
    background: var(--success-surface);
    color: var(--success-700);
  }

  .step-card {
    background: var(--surface-primary);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    margin-bottom: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease;
    border: 1px solid rgba(0,0,0,0.03);
  }
  .step-card:active { transform: scale(0.985); }
  .step-card.completed {
    box-shadow: var(--shadow-subtle);
    cursor: default;
  }
  .step-card.completed:active { transform: none; }
  .step-card-inner {
    display: flex;
    align-items: center;
    padding: 18px 20px;
    gap: 16px;
  }
  .step-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-icon svg { width: 22px; height: 22px; }
  .step-content {
    flex: 1;
    min-width: 0;
  }
  .step-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .step-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--neutral-800);
    letter-spacing: -0.43px;
    line-height: 22px;
  }
  .step-desc {
    font-size: 13px;
    font-weight: 400;
    color: var(--neutral-400);
    margin-top: 2px;
    letter-spacing: -0.08px;
    line-height: 18px;
  }
  .step-action {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step-done-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--success-500);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-done-icon svg { width: 14px; height: 14px; }

  /* === STICKY CTA === */
  .sticky-cta {
    background: var(--surface-primary);
    padding: 12px 16px;
    border-top: 1px solid rgba(0,0,0,0.04);
    position: sticky;
    bottom: 0;
    z-index: 10;
    margin-top: 4px;
  }
  .sticky-cta-inner {
    padding-bottom: env(safe-area-inset-bottom, 8px);
  }
  .cta-btn {
    width: 100%;
    padding: 16px 0;
    border-radius: var(--radius-pill);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.43px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  .cta-btn.enabled {
    background: var(--blue-900);
    color: var(--surface-primary);
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(1, 42, 114, 0.25);
  }
  .cta-btn.enabled:active { opacity: 0.9; transform: scale(0.985); }

  /* === HOME INDICATOR === */
  .home-indicator {
    width: 134px;
    height: 5px;
    background: var(--neutral-900);
    border-radius: 3px;
    margin: 6px auto 4px;
    opacity: 0.18;
  }

  /* === Animations === */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes badgeDrop {
    0% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .badge-drop {
    animation: badgeDrop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }
  .animate-in {
    animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
  }
  .delay-1 { animation-delay: 0.05s; }
  .delay-2 { animation-delay: 0.1s; }
  .delay-3 { animation-delay: 0.15s; }
  .delay-4 { animation-delay: 0.2s; }
</style>
</head>
<body>

<div class="device-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 17 12" fill="none"><path d="M16.5 1C16.5 0.447 16.053 0 15.5 0H14.5C13.947 0 13.5 0.447 13.5 1V11C13.5 11.553 13.947 12 14.5 12H15.5C16.053 12 16.5 11.553 16.5 11V1Z" fill="currentColor"/><path d="M12 3C12 2.447 11.553 2 11 2H10C9.447 2 9 2.447 9 3V11C9 11.553 9.447 12 10 12H11C11.553 12 12 11.553 12 11V3Z" fill="currentColor"/><path d="M7.5 5.5C7.5 4.947 7.053 4.5 6.5 4.5H5.5C4.947 4.5 4.5 4.947 4.5 5.5V11C4.5 11.553 4.947 12 5.5 12H6.5C7.053 12 7.5 11.553 7.5 11V5.5Z" fill="currentColor"/><path d="M3 8C3 7.447 2.553 7 2 7H1C0.447 7 0 7.447 0 8V11C0 11.553 0.447 12 1 12H2C2.553 12 3 11.553 3 11V8Z" fill="currentColor"/></svg>

  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">

  <div class="scroll-content">

          Limit Unlocked
        </div>

      <!-- Step 1: KYC — COMPLETED -->
      <div class="step-card completed">
        <div class="step-card-inner">
          <div class="step-icon" style="background: var(--success-surface);">

      <!-- Step 2: UPI AutoPay — COMPLETED -->
      <div class="step-card completed">

          <div class="step-content">

          <div class="step-action">

    <!-- Sticky CTA -->

      <div class="sticky-cta-inner">

      <div class="home-indicator"></div>

  </div>

</div>

</body>
</html>
