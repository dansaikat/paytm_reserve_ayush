<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reserve Credit — Disbursing</title>
<script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
<style>
  :root {
    --blue-500: #0088FF;
    --blue-600: #1576DB;
    --blue-700: #004299;
    --blue-900: #012A72;
    --blue-50: #E8F4FF;

    --success-500: #34C759;

    --neutral-900: #000000;
    --neutral-800: #1B1B1B;
    --neutral-700: #282828;
    --neutral-600: #333333;
    --neutral-500: #404040;
    --neutral-400: #595959;
    --neutral-300: #7E7E7E;
    --neutral-200: #999999;
    --neutral-100: #D9D9D9;
    --neutral-50: #E6E6E6;

    --surface-primary: #FFFFFF;
    --surface-secondary: #F2F2F7;

    --radius-pill: 100px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'SF Pro Display', system-ui, sans-serif;
    background: var(--surface-secondary);
    color: var(--neutral-800);
    overflow-x: hidden;
  }

  .device-frame {
    width: 376px; height: 812px; margin: 0 auto;
    background: var(--surface-primary);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px 0; height: 44px;
    background: var(--surface-primary); flex-shrink: 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons svg { width: 16px; height: 12px; }

  .nav-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 14px; background: var(--surface-primary);
    position: relative; flex-shrink: 0;
  }
  .nav-back {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none;
    background: var(--surface-secondary); border-radius: 50%;
    flex-shrink: 0; transition: background 0.15s ease;
  }
  .nav-back:active { background: var(--neutral-50); }
  .nav-back svg { width: 9px; height: 16px; }
  .nav-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; height: 44px;
  }
  .nav-brand { height: 30px; width: auto; }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 32px;
    text-align: center;
  }

  lottie-player {
    margin-bottom: 32px;
  }

  .loader-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--neutral-800);
    letter-spacing: -0.4px;
    line-height: 30px;
    margin-bottom: 12px;
  }

  .loader-subtitle {
    font-size: 14px;
    font-weight: 400;
    color: var(--neutral-400);
    line-height: 20px;
    letter-spacing: -0.08px;
    max-width: 280px;
  }

  .bottom-section {
    padding: 0 32px 0;
    text-align: center;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom, 16px);
    margin-bottom: 20px;
  }

  .countdown-text {
    font-size: 14px;
    font-weight: 400;
    color: var(--neutral-400);
    letter-spacing: -0.08px;
    margin-bottom: 14px;
  }
  .countdown-text strong {
    font-weight: 700;
    color: var(--neutral-800);
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: var(--surface-secondary);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--success-500);
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  .lender-text {
    font-size: 12px;
    font-weight: 400;
    color: var(--neutral-300);
    letter-spacing: -0.08px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .lender-logo {
    height: 16px;
    width: auto;
    display: inline-block;
    font-weight: 800;
    font-size: 13px;
    color: var(--neutral-700);
    letter-spacing: 0.5px;
    background: var(--surface-secondary);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .home-indicator {
    width: 134px; height: 5px;
    background: var(--neutral-900); border-radius: 3px;
    margin: 8px auto 4px; opacity: 0.18;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in {
    animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
  }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.3s; }
</style>
</head>
<body>

<div class="device-frame">

  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 17 12" fill="none"><path d="M16.5 1C16.5 0.447 16.053 0 15.5 0H14.5C13.947 0 13.5 0.447 13.5 1V11C13.5 11.553 13.947 12 14.5 12H15.5C16.053 12 16.5 11.553 16.5 11V1Z" fill="currentColor"/><path d="M12 3C12 2.447 11.553 2 11 2H10C9.447 2 9 2.447 9 3V11C9 11.553 9.447 12 10 12H11C11.553 12 12 11.553 12 11V3Z" fill="currentColor"/><path d="M7.5 5.5C7.5 4.947 7.053 4.5 6.5 4.5H5.5C4.947 4.5 4.5 4.947 4.5 5.5V11C4.5 11.553 4.947 12 5.5 12H6.5C7.053 12 7.5 11.553 7.5 11V5.5Z" fill="currentColor"/><path d="M3 8C3 7.447 2.553 7 2 7H1C0.447 7 0 7.447 0 8V11C0 11.553 0.447 12 1 12H2C2.553 12 3 11.553 3 11V8Z" fill="currentColor"/></svg>
      <svg viewBox="0 0 16 12" fill="none"><path d="M8 3.6C9.7 3.6 11.2 4.3 12.3 5.4L13.8 3.9C12.3 2.4 10.3 1.5 8 1.5C5.7 1.5 3.7 2.4 2.2 3.9L3.7 5.4C4.8 4.3 6.3 3.6 8 3.6Z" fill="currentColor"/><path d="M8 6.8C9 6.8 9.9 7.2 10.5 7.8L12 6.3C11 5.3 9.6 4.7 8 4.7C6.4 4.7 5 5.3 4 6.3L5.5 7.8C6.1 7.2 7 6.8 8 6.8Z" fill="currentColor"/><circle cx="8" cy="10.5" r="1.5" fill="currentColor"/></svg>
      <svg viewBox="0 0 25 12" fill="none"><rect x="0" y="1" width="21" height="10" rx="2" stroke="currentColor" stroke-width="1"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="currentColor"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.3 24.5 6C24.5 5.7 23.8 4.8 23 4.5Z" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="nav-bar">
    <button class="nav-back" onclick="history.back()">
      <svg viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9L9 17" stroke="var(--neutral-800)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="nav-center">
      <img src="../assets/brand-logo.svg" alt="Paytm Reserve" class="nav-brand">
    </div>
    <div style="width: 36px;"></div>
  </div>

  <div class="main-content animate-in delay-1">
    <lottie-player
      id="lottiePlayer"
      src="../assets/loan-disbursal.json"
      background="transparent"
      speed="1"
      style="width: 220px; height: 220px;"
      loop
      autoplay
    ></lottie-player>
    <div class="loader-title">Initiating disbursement...</div>
    <div class="loader-subtitle">Your funds are being transferred to your bank account. This will only take a moment.</div>
  </div>

  <div class="bottom-section animate-in delay-2">
    <div class="countdown-text">Proceeding in <strong id="countdown">05</strong> seconds...</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="lender-text">
      Loan provided by <span class="lender-logo">U GRO</span>
    </div>
    <div class="home-indicator"></div>
  </div>

</div>

<script>
  const DURATION = 5;
  const countdownEl = document.getElementById('countdown');
  const progressFill = document.getElementById('progressFill');

  let elapsed = 0;
  const interval = 100;

  const timer = setInterval(() => {
    elapsed += interval;
    const secs = Math.ceil((DURATION * 1000 - elapsed) / 1000);
    const pct = (elapsed / (DURATION * 1000)) * 100;

    progressFill.style.width = Math.min(pct, 100) + '%';
    countdownEl.textContent = String(Math.max(secs, 0)).padStart(2, '0');

    if (elapsed >= DURATION * 1000) {
      clearInterval(timer);
      countdownEl.textContent = '00';
      progressFill.style.width = '100%';
      setTimeout(() => {
        if (window.self === window.top) window.location.href = 'post-withdrawal.html';
      }, 300);
    }
  }, interval);
</script>

</body>
</html>
